<!DOCTYPE html>
<html>
<head>
    <title>Управление пользователями</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #3498db; color: white; }
        .btn { padding: 5px 10px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; }
        .btn-add { background: #27ae60; padding: 10px 20px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>👥 Управление пользователями</h2>
    <a href="/dashboard" class="btn btn-add">← На главную</a>
    <a href="/add_user" class="btn btn-add" style="background: #27ae60;">➕ Добавить пользователя</a>
    
    <table>
        <tr><th>ID</th><th>ФИО</th><th>Логин</th><th>Роль</th><th>Класс</th><th>Действие</th></tr>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.login }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.class or '' }}</td>
            <td>
                {% if user.id != session.user_id %}
                    <a href="/delete_user/{{ user.id }}" class="btn" onclick="return confirm('Удалить?')">🗑️ Удалить</a>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
