<!DOCTYPE html>
<html>
<head>
    <title>Отклонение заявления</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-box { background: white; padding: 30px; border-radius: 10px; width: 350px; }
        h2 { text-align: center; color: #c0392b; }
        textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .back { display: block; text-align: center; margin-top: 15px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>❌ Отклонение заявления {{ number }}</h2>
        <form method="post">
            <textarea name="reason" rows="4" placeholder="Причина отказа" required></textarea>
            <button type="submit">Отклонить</button>
        </form>
        <a href="/pending" class="back">← Назад</a>
    </div>
</body>
</html>
